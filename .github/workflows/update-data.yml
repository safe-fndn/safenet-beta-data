# It pulls data from the chain using the safenet-staking-scripts Docker image
# and commits updated JSON assets back to the repo.
name: Update Safenet Data

on:
  schedule:
    - cron: '0 */3 * * *'  # Daily at midnight and every 3h
  workflow_dispatch:
    inputs:
      network:
        type: choice
        description: Safenet network to update
        options: 
          - beta
          - devnet

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    env:
      IMAGE: ghcr.io/safe-fndn/safenet-staking-scripts:main
      ENV_FILE: config/${{ github.event.inputs.network || 'beta' }}.env
      DATABASE_FILE: /workspace/safenet.${{ github.event.inputs.network || 'beta' }}.db

    steps:
      - uses: actions/checkout@v6

      # Restore the SQLite database from the previous run so that event indexing
      # is incremental rather than starting from scratch each time.
      - name: Safenet Database Cache
        uses: actions/cache@v4
        with:
          path: safenet.${{ github.event.inputs.network || 'beta' }}.db
          key: safenet-${{ github.event.inputs.network || 'beta' }}-db-${{ github.run_id }}
          restore-keys: safenet-${{ github.event.inputs.network || 'beta' }}-db-

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Fetch and index on-chain events into the local database. This must run
      # before any of the recording commands below.
      - name: Index Events
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            --env-file "$ENV_FILE" \
            -e DATABASE_FILE \
            -e DEBUG='safenet,safenet:*' \
            "$IMAGE" \
            index

      # Write network totals to assets/network-info.json.
      - name: Record Totals
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            --env-file "$ENV_FILE" \
            -e DATABASE_FILE \
            "$IMAGE" \
            totals --record /workspace

      # Update participation rates in assets/validator-info.json.
      - name: Record Participation
        run: |
          end="$(date -d "$(date '+%H:00:00')" '+%s')"
          start="$((end - 1209600))"
          echo "computing participation for: $(date -d @$start) - $(date -d @$end)"
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            --env-file "$ENV_FILE" \
            -e DATABASE_FILE \
            "$IMAGE" \
            participation --record /workspace --rewardPeriodStart "$start" --rewardPeriodEnd "$end"

      # Commit any updated asset files back to the repo. Only run when updating
      # assets on the correct branch. This allows us to test workflows on PR
      # branches with cache and without unexpected update errors.
      - name: Commit Changes
        if: ${{ (github.ref_name == 'main' && (github.event.inputs.network || 'beta') == 'beta') || (github.ref_name == 'devnet' && github.event.inputs.network == 'devnet') }}
        run: |
          make fix
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/network-info.json assets/validator-info.json
          git diff --staged --quiet || git commit -m "chore: update safenet data"
          git pull --rebase origin ${{ github.ref_name }}
          git push
